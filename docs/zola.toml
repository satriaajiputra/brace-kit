# The URL the site will be built for
base_url = "https://bracekit.nexifle.com"

# Site info
title = "BraceKit"
description = "AI-Powered Chrome Sidebar with MCP Support"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

# Default language
default_language = "en"

# Generate RSS feed
generate_feeds = true
feed_filenames = ["rss.xml"]

# Taxonomies
taxonomies = []

[markdown]
# External links open in new tab
external_links_target_blank = true
# Enable smart punctuation
smart_punctuation = true

[markdown.highlighting]
# Use CSS classes so we can switch themes via JS based on data-theme attribute
style = "class"
light_theme = "github-light"
dark_theme = "github-dark"

[extra]
# Put all your custom variables here
github_url = "https://github.com"
twitter_url = ""
saweria_url = "https://saweria.co/bracekit"
kofi_url = "https://ko-fi.com/bracekit"

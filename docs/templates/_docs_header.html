                <defs>
                    <clipPath id="clip_header">
                        <rect width="400" height="400" fill="white" />
                    </clipPath>
                </defs>
            </svg>
            <span class="docs-header__logo-text">BraceKit</span>
            <span class="docs-header__badge">Docs</span>
        </a>

        <!-- Center: Search bar -->
        <div class="docs-header__center">
            <div class="docs-search" id="docs-search" role="search">
                <label for="search-input" class="sr-only">Search documentation</label>
                <div class="docs-search__input-wrap">
                    <svg class="docs-search__icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                    </svg>
                    <input id="search-input" class="docs-search__input" type="search" placeholder="Search docs…"
                        autocomplete="off" spellcheck="false" aria-label="Search documentation" aria-expanded="false"
                        aria-controls="search-results" aria-haspopup="listbox">
                    <kbd class="docs-search__kbd" aria-hidden="true">/</kbd>
                </div>
                <div class="docs-search__results" id="search-results" role="listbox" aria-label="Search results" hidden>
                    <div class="docs-search__results-inner" id="search-results-inner"></div>
                </div>
            </div>
        </div>

        <!-- Right actions -->
        <div class="docs-header__actions">
            <!-- Donate dropdown -->
            <div class="docs-header__donate" id="header-donate">
                <button class="docs-header__action-btn docs-header__donate-toggle" id="header-donate-toggle"
                    aria-label="Support BraceKit" aria-expanded="false" aria-haspopup="true" title="Support BraceKit">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                    </svg>
                </button>
                <div class="docs-header__donate-dropdown" id="header-donate-dropdown" hidden>
                    <a href="{{ config.extra.saweria_url }}" class="docs-header__donate-item" id="hdr-donate-saweria"
                        target="_blank" rel="noopener noreferrer">
                        <span class="docs-header__donate-item-flag" aria-hidden="true">🇮🇩</span>
                        <span class="docs-header__donate-item-body">
                            <span class="docs-header__donate-item-name">Saweria</span>
                        </span>
                    </a>
                    <a href="{{ config.extra.kofi_url }}" class="docs-header__donate-item" id="hdr-donate-kofi"
                        target="_blank" rel="noopener noreferrer">
                        <span class="docs-header__donate-item-flag" aria-hidden="true">☕</span>
                        <span class="docs-header__donate-item-body">
                            <span class="docs-header__donate-item-name">Ko-fi</span>
                        </span>
                    </a>
                </div>
            </div>
            <a href="{{ config.extra.github_url }}" class="docs-header__action-btn" target="_blank" rel="noopener"
                aria-label="GitHub">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path
                        d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" />
                </svg>
            </a>
            <button class="docs-header__action-btn theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    aria-hidden="true">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path
                        d="M12 2v2M12 20v2m-7.07-14.07 1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2m-4.34-7.07-1.41 1.41M6.34 17.66l-1.41 1.41">
                    </path>
                </svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    aria-hidden="true">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                </svg>
            </button>
            <button class="docs-header__action-btn docs-sidebar-toggle" id="sidebar-toggle"
                aria-label="Toggle navigation" aria-expanded="false" aria-controls="docs-sidebar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>
</header>

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: vars
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${INPUT_VERSION}" >> $GITHUB_OUTPUT
          else
            echo "version=${REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build production
        run: bun run build

      - name: Create zip
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          cd dist
          zip -r "../bracekit-${VERSION}.zip" .

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Sign extension (.crx)
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          echo "${CRX_PRIVATE_KEY}" | base64 --decode > /tmp/crx_private_key.pem
          google-chrome --pack-extension=dist --pack-extension-key=/tmp/crx_private_key.pem
          mv dist.crx "bracekit-${VERSION}.crx"
          rm -f /tmp/crx_private_key.pem

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}"
          git push origin "${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.version }}
          name: BraceKit ${{ steps.vars.outputs.version }}
          files: |
            bracekit-${{ steps.vars.outputs.version }}.zip
            bracekit-${{ steps.vars.outputs.version }}.crx
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

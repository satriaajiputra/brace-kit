<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to BraceKit — Your Autonomous Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Instrument+Sans:ital,wght@0,400..600;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="onboarding.css">
  <style>
    :root {
      --bg: #050505;
      --fg: #fafafa;
      --accent: #ffffff;
    }
    
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
    }

    .font-serif {
      font-family: 'Instrument Serif', serif;
    }

    .font-bricolage {
      font-family: 'Bricolage Grotesque', sans-serif;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Selection */
    ::selection {
      background: var(--fg);
      color: var(--bg);
    }
  </style>
</head>
<body class="dark">
  <div id="root"></div>
  <script type="module" src="onboarding.js"></script>
</body>
</html>

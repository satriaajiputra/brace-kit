<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to BraceKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="onboarding.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #050505;
      color: #fafafa;
      font-family: 'Instrument Sans', sans-serif;
    }
    .font-bricolage {
      font-family: 'Bricolage Grotesque', sans-serif;
    }
    @keyframes slide-up {
      from { transform: translateY(2rem); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes pulse-slow {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.05); }
    }
    .animate-slide-up { animation: slide-up 1s cubic-bezier(0.16, 1, 0.3, 1); }
    .animate-fade-in { animation: fade-in 1s ease-out; }
    .animate-pulse-slow { animation: pulse-slow 8s ease-in-out infinite; }
  </style>
</head>
<body class="dark">
  <div id="root"></div>
  <script type="module" src="onboarding.js"></script>
</body>
</html>
